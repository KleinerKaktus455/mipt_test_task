version: "3.9"

services:
  api:
    platform: linux/amd64
    build: .
    container_name: doc-ocr-api-macos
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      USE_RUSSIAN_DOCS_OCR: "1"
      RUS_DOCS_DEVICE: "cpu"
      RUS_DOCS_MODEL_FORMAT: "ONNX"
      DESKEW_PRIMARY: "projection"
      DESKEW_COARSE_90: "0"
      # Документ крупнее в кадре (аналог ручной обрезки фона); отключить: "0"
      PREP_AUTO_DOC_CROP: "1"
      PREP_CROP_METHOD: "auto"
      PYTHONUNBUFFERED: "1"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  streamlit:
    platform: linux/amd64
    build: .
    container_name: doc-ocr-streamlit-macos
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      USE_RUSSIAN_DOCS_OCR: "1"
      RUS_DOCS_DEVICE: "cpu"
      RUS_DOCS_MODEL_FORMAT: "ONNX"
      DESKEW_PRIMARY: "projection"
      DESKEW_COARSE_90: "0"
      PREP_AUTO_DOC_CROP: "1"
      PREP_CROP_METHOD: "auto"
      PYTHONUNBUFFERED: "1"
    command: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - api

